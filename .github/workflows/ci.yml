name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    strategy:
      fail-fast: false
      matrix:
        package: [outlook-mcp-server, langgraph-mcp-tester]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Sync dependencies
        working-directory: ${{ matrix.package }}
        run: |
          if [ "${{ matrix.package }}" = "outlook-mcp-server" ]; then
            uv sync --extra dev --extra pii
          else
            uv sync --extra dev
          fi

      - name: Download spaCy model (outlook-mcp-server PII tests)
        if: matrix.package == 'outlook-mcp-server'
        working-directory: ${{ matrix.package }}
        run: uv run python -m spacy download en_core_web_sm

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: uv run pytest
